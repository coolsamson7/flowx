{{- if .Values.monitoring.enabled }}
# Tells Prometheus to scrape the /actuator/prometheus endpoint
# on every pod that has the label "monitored: true"
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rpc-nodes
  labels:
    # kube-prometheus-stack picks up ServiceMonitors with this label by default
    release: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      monitored: "true"
  endpoints:
    - port: metrics          # matches the named port in each Service below
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
  {{- end }}