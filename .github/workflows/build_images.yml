name: Build & Push Docker Images

on:
  push:
    tags:
      - 'ingress-v*'
      - 'node-v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      OWNER: coolsamson7
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-home

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine app & version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Detected tag: $TAG"

          if [[ "$TAG" == ingress-* ]]; then
            APP=ingress
            VERSION=${TAG#ingress-v}
          elif [[ "$TAG" == node-* ]]; then
            APP=node
            VERSION=${TAG#node-v}
          else
            echo "No app matched for tag: $TAG"
            exit 1
          fi

          echo "APP=$APP"           >> $GITHUB_ENV
          echo "VERSION=$VERSION"   >> $GITHUB_ENV
          echo "Will build $APP version $VERSION"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Debug environment
        run: |
          echo "=== Disk space ==="
          df -h

          echo "=== Java version ==="
          java -version

          echo "=== GRADLE_USER_HOME ==="
          echo "$GRADLE_USER_HOME"

          echo "=== Workspace permissions ==="
          ls -la ${{ github.workspace }}

          echo "=== Mount points ==="
          mount | grep -E "noexec|nosuid" || echo "no noexec mounts found"

          echo "=== ulimits ==="
          ulimit -a

      - name: Build & Push Docker Image
        run: |
          echo "Building ${{ env.APP }} version ${{ env.VERSION }}"
          ./gradlew --no-daemon --no-build-cache --stacktrace --info :k8demo/${{ env.APP }}:jib \
            -Djib.to.image=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.APP }}:${{ env.VERSION }} 2>&1 | tee build.log || true

      - name: Show tail of build log on failure
        if: failure()
        run: |
          echo "=== Last 100 lines of build output ==="
          tail -100 build.log

          echo "=== Disk space after failure ==="
          df -h

          echo "=== Gradle home contents ==="
          ls -la ${{ github.workspace }}/.gradle-home/caches/ 2>/dev/null || echo "cache dir not found"

          echo "=== Check the failing JAR in module cache ==="
          find ${{ github.workspace }}/.gradle-home -name "jackson-core*.jar" 2>/dev/null | while read f; do
            echo "$f: $(ls -lh $f) / $(file $f)"
          done

          echo "=== inode usage ==="
          df -i