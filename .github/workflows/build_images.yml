name: Build & Push Docker Images

on:
  push:
    tags:
      - 'ingress-v*'
      - 'node-v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      OWNER: coolsamson7

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine app & version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Detected tag: $TAG"

          if [[ "$TAG" == ingress-* ]]; then
            APP=ingress
            VERSION=${TAG#ingress-v}
          elif [[ "$TAG" == node-* ]]; then
            APP=node
            VERSION=${TAG#node-v}
          else
            echo "No app matched for tag: $TAG"
            exit 1
          fi

          echo "APP=$APP"           >> $GITHUB_ENV
          echo "VERSION=$VERSION"   >> $GITHUB_ENV
          echo "Will build $APP version $VERSION"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build & Push Docker Image
        run: |
          echo "Building ${{ env.APP }} version ${{ env.VERSION }}"
          ./gradlew --no-daemon :k8demo:${{ env.APP }}:jib \
            -Djib.to.image=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.APP }}:${{ env.VERSION }}