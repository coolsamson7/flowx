name: Build & Push Docker Images

on:
  push:
    tags:
      - 'ingress-v*'
      - 'node-v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      OWNER: coolsamson7

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4️⃣ Determine app & version from tag
      - name: Determine app & version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Detected tag: $TAG"

          if [[ "$TAG" == ingress-* ]]; then
            APP=ingress
            VERSION=${TAG#ingress-}
          elif [[ "$TAG" == node-* ]]; then
            APP=node
            VERSION=${TAG#node-}
          else
            echo "No app matched"
            exit 1
          fi

          echo "APP=$APP" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building $APP version $VERSION"

      # 5️⃣ Make Gradle wrapper executable
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # 6️⃣ Clean Gradle cache (CI-friendly)
      - name: Clean Gradle cache
        run: rm -rf ~/.gradle/caches/

      # 7️⃣ Build & Push Docker Image using root gradlew
      - name: Build & Push Docker Image
        run: |
          echo "Building $APP version $VERSION"
          ./gradlew --no-daemon :k8demo/$APP:jib --refresh-dependencies \
            -Djib.to.image=${{ env.REGISTRY }}/${{ env.OWNER }}/$APP:$VERSION