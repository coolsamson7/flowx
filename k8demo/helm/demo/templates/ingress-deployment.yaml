apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress
  template:
    metadata:
      labels:
        app: ingress
      annotations:
        # Promtail uses these to enrich log lines with app/version context
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: ingress
          image: "{{ .Values.ingress.image }}:{{ .Values.ingress.tag }}"
          ports:
            - name: http
              containerPort: 8080
            - name: metrics         # Spring Boot actuator on a separate port
              containerPort: 8081
          env:
            - name: REGISTRY_URL
              value: "http://ingress:9000"
            - name: NODE_URL
              value: "http://ingress:8080"
            - name: NODE_PORT
              value: "8080"
            # Expose actuator on a dedicated port so it never mixes with RPC traffic
            - name: MANAGEMENT_SERVER_PORT
              value: "8081"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,prometheus,metrics,info"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ingress
  labels:
    monitored: "true"    # picked up by ServiceMonitor
spec:
  type: NodePort
  selector:
    app: ingress
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: metrics
      port: 8081
      targetPort: 8081